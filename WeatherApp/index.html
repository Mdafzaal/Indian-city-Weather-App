<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian city Weather_App</title>
    <link rel="icon" type="favicon2.png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="shape1 shape ">

    </div>

    <div class="shape2 shape">
        
    </div>

    <div class="back">
        <div class="card">
            <div class="search">
                
                <input type="text" placeholder="Search for a city..." id="searchInput">
                
                <button id="btn"><img src="searchicon.svg" alt="Search" width="30" height="20" background="none" margin="10px"></button>
            </div>

            <h3 id="invalid">Invalid City</h3>
            <div class="weatherStatus">
                <div class="w1">
                <img src="day.svg" alt="clear">
                <h1 id="temp">27°C</h1>
                <h1 id="city">Delhi</h1>
            </div>

            <div class="w2">
                <div class="humidity">
                    <img src="humidity.svg" alt="Humidity">
                    <h2 id="dh">20%</h2>
                    <h1 id="th">Humidity</h1>
                </div>

                <div class="wind">
                    <img src="airspeed.svg" alt="wind">
                    <h2 id="dw">20 km/h</h2>
                    <h1 id="tw">Wind Speed</h1>
                </div>

            </div>
        </div>
    </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
